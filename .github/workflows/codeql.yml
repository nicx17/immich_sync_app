name: "CodeQL Analysis"

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "docs/**"
      - "wiki/**"
      - "README.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
      - "roadmap.md"
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - "docs/**"
      - "wiki/**"
      - "README.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
      - "roadmap.md"
  schedule:
    - cron: '30 2 * * 1'

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: "--no-deprecation"

jobs:
  analyze:
    name: Analyze (Rust)
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: rust
        build-mode: none

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:rust"
