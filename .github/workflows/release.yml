name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: "--no-deprecation"

jobs:
  create-release:
    runs-on: ubuntu-24.04
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgtk-4-dev libadwaita-1-dev libglib2.0-dev pkg-config build-essential libsecret-1-dev gnupg

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Verify tag matches crate version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d '"' -f 2)

          if [[ "${TAG_VERSION}" != "${CARGO_VERSION}" ]]; then
            echo "Tag version ($TAG_VERSION) does not match Cargo.toml ($CARGO_VERSION)"
            exit 1
          fi

      - name: Import Flatpak signing key
        id: signing_key
        env:
          FLATPAK_GPG_PRIVATE_KEY: ${{ secrets.FLATPAK_GPG_PRIVATE_KEY }}
          FLATPAK_GPG_KEY_ID: ${{ secrets.FLATPAK_GPG_KEY_ID }}
        run: |
          export GNUPGHOME="$RUNNER_TEMP/gnupg"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"

          printf '%s' "$FLATPAK_GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --batch --export "$FLATPAK_GPG_KEY_ID" > "$RUNNER_TEMP/mimick-repo-public.gpg"

          echo "public_key_b64=$(base64 --wrap=0 "$RUNNER_TEMP/mimick-repo-public.gpg")" >> "$GITHUB_OUTPUT"

      - name: Build release assets
        env:
          REPO_GPG_KEY: ${{ steps.signing_key.outputs.public_key_b64 }}
        run: |
          mkdir -p dist

          {
            printf '[Flatpak Repo]\n'
            printf 'Title=Mimick Repository\n'
            printf 'RuntimeRepo=https://dl.flathub.org/repo/flathub.flatpakrepo\n'
            printf 'Url=https://nicx17.github.io/mimick/\n'
            printf 'Homepage=https://github.com/nicx17/mimick\n'
            printf 'Comment=Official repository for the Mimick Immich sync daemon\n'
            printf 'Description=A daemon-based synchronization tool for uploading media files from a Linux desktop to an Immich server.\n'
            printf 'Icon=https://nicx17.github.io/mimick/icon.png\n'
            printf 'GPGKey=%s\n' "$REPO_GPG_KEY"
          } > dist/mimick.flatpakrepo

          {
            printf '[Flatpak Ref]\n'
            printf 'Title=Mimick\n'
            printf 'Name=dev.nicx.mimick\n'
            printf 'Branch=stable\n'
            printf 'Url=https://nicx17.github.io/mimick/\n'
            printf 'SuggestRemoteName=mimick\n'
            printf 'Homepage=https://github.com/nicx17/mimick\n'
            printf 'Icon=https://nicx17.github.io/mimick/icon.png\n'
            printf 'RuntimeRepo=https://dl.flathub.org/repo/flathub.flatpakrepo\n'
            printf 'IsRuntime=false\n'
            printf 'GPGKey=%s\n' "$REPO_GPG_KEY"
          } > dist/mimick.flatpakref

          sha256sum dist/mimick.flatpakrepo dist/mimick.flatpakref > dist/SHA256SUMS.txt

      - name: Find matching draft release
        id: draft_release
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const tagName = process.env.GITHUB_REF_NAME;
            const releaseName = tagName.replace(/^v/, "");
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            const drafts = releases
              .filter((release) => release.draft)
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            const draft = drafts.find((release) =>
              release.tag_name === tagName || release.name === releaseName
            );
            if (!draft) {
              core.info(`No draft release found for ${tagName}. Falling back to CHANGELOG.md.`);
              core.setOutput("found", "false");
              return;
            }

            core.info(`Using draft release #${draft.id} (${draft.name || draft.tag_name})`);
            core.setOutput("found", "true");
            core.setOutput("id", String(draft.id));
            core.setOutput("body", draft.body || "");

      - name: Extract fallback release notes from changelog
        if: steps.draft_release.outputs.found != 'true'
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          awk -v version="$TAG_VERSION" '
            $0 ~ "^## \\[" version "\\]" { capture=1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md | sed '/./,$!d' > dist/release-notes.md

      - name: Write draft release notes
        if: steps.draft_release.outputs.found == 'true'
        shell: bash
        run: |
          cat <<'EOF' > dist/release-notes.md
          ${{ steps.draft_release.outputs.body }}
          EOF

      - name: Publish matching draft release
        if: steps.draft_release.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          jq -n \
            --arg tag_name "${GITHUB_REF_NAME}" \
            --arg target_commitish "${GITHUB_SHA}" \
            --arg name "${TAG_VERSION}" \
            --rawfile body dist/release-notes.md \
            '{
              tag_name: $tag_name,
              target_commitish: $target_commitish,
              name: $name,
              body: $body,
              draft: false,
              prerelease: false,
              make_latest: "true"
            }' > dist/release-payload.json

          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/releases/${{ steps.draft_release.outputs.id }}" \
            --input dist/release-payload.json

          gh release upload "${GITHUB_REF_NAME}" \
            dist/mimick.flatpakrepo \
            dist/mimick.flatpakref \
            dist/SHA256SUMS.txt \
            --clobber

      - name: Publish GitHub release from changelog fallback
        if: steps.draft_release.outputs.found != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          gh release create "${GITHUB_REF_NAME}" \
            dist/mimick.flatpakrepo \
            dist/mimick.flatpakref \
            dist/SHA256SUMS.txt \
            --title "${TAG_VERSION}" \
            --notes-file dist/release-notes.md
