name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: "--no-deprecation"

jobs:
  create-release:
    runs-on: ubuntu-24.04
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgtk-4-dev libadwaita-1-dev libglib2.0-dev pkg-config build-essential libsecret-1-dev gnupg

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Verify tag matches crate version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d '"' -f 2)

          if [[ "${TAG_VERSION}" != "${CARGO_VERSION}" ]]; then
            echo "Tag version ($TAG_VERSION) does not match Cargo.toml ($CARGO_VERSION)"
            exit 1
          fi

      - name: Run tests
        run: cargo test --locked

      - name: Import Flatpak signing key
        id: signing_key
        env:
          FLATPAK_GPG_PRIVATE_KEY: ${{ secrets.FLATPAK_GPG_PRIVATE_KEY }}
          FLATPAK_GPG_KEY_ID: ${{ secrets.FLATPAK_GPG_KEY_ID }}
        run: |
          export GNUPGHOME="$RUNNER_TEMP/gnupg"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"

          printf '%s' "$FLATPAK_GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --batch --export "$FLATPAK_GPG_KEY_ID" > "$RUNNER_TEMP/mimick-repo-public.gpg"

          echo "public_key_b64=$(base64 --wrap=0 "$RUNNER_TEMP/mimick-repo-public.gpg")" >> "$GITHUB_OUTPUT"

      - name: Build release assets
        env:
          REPO_GPG_KEY: ${{ steps.signing_key.outputs.public_key_b64 }}
        run: |
          mkdir -p dist

          cat << EOF > dist/mimick.flatpakrepo
          [Flatpak Repo]
          Title=Mimick Repository
          Url=https://nicx17.github.io/mimick/
          Homepage=https://github.com/nicx17/mimick
          Comment=Official repository for the Mimick Immich sync daemon
          Description=A daemon-based synchronization tool for uploading media files from a Linux desktop to an Immich server.
          Icon=https://nicx17.github.io/mimick/icon.png
          GPGKey=$REPO_GPG_KEY
          EOF

          sha256sum dist/mimick.flatpakrepo > dist/SHA256SUMS.txt

      - name: Extract release notes
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          awk -v version="$TAG_VERSION" '
            $0 ~ "^## \\[" version "\\]" { capture=1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md | sed '/./,$!d' > dist/release-notes.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/release-notes.md
          files: |
            dist/mimick.flatpakrepo
            dist/SHA256SUMS.txt
