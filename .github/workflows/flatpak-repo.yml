name: Build and Deploy Flatpak Repo

on:
  push:
    branches: [ "main" ] # Runs every time you push to main
  workflow_dispatch: # Allows you to run it manually from the Actions tab

concurrency:
  group: pages
  cancel-in-progress: true

# Grants permissions to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
  
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flatpak & Builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Build Flatpak Repository
        run: |
          # Build the app and output it to a folder named 'repo'
          flatpak-builder --user --repo=repo --force-clean --install-deps-from=flathub build-dir io.github.nicx17.mimick.local.yml
          flatpak build-update-repo repo --generate-static-deltas
    
      - name: Generate .flatpakrepo file
        run: |
          cat << 'EOF' > repo/mimick.flatpakrepo
          [Flatpak Repo]
          Title=Mimick Repository
          Url=https://nicx17.github.io/mimick/
          Homepage=https://github.com/nicx17/mimick
          Comment=Official repository for the Mimick Immich sync daemon
          Description=A daemon-based synchronization tool for uploading media files from a Linux desktop to an Immich server.
          Icon=https://nicx17.github.io/mimick/icon.png
          GPGVerify=false
          EOF
          
      - name: Copy landing page assets
        run: |
          cp site/index.html repo/index.html
          cp site/styles.css repo/styles.css
          cp site/icon.png repo/icon.png

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'repo' # Uploads the compiled Flatpak repo

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
