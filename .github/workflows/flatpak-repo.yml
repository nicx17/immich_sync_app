name: Build and Deploy Flatpak Repo

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: "--no-deprecation"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Flatpak Builder
        uses: actions/cache@v4
        with:
          path: |
            .flatpak-builder/downloads
            .flatpak-builder/ccache
          key: ${{ runner.os }}-flatpak-builder-${{ hashFiles('io.github.nicx17.mimick.local.yml') }}
          restore-keys: |
            ${{ runner.os }}-flatpak-builder-

      - name: Install Flatpak & Builder
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends flatpak flatpak-builder gnupg
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Import Flatpak signing key
        id: signing_key
        env:
          FLATPAK_GPG_PRIVATE_KEY: ${{ secrets.FLATPAK_GPG_PRIVATE_KEY }}
          FLATPAK_GPG_KEY_ID: ${{ secrets.FLATPAK_GPG_KEY_ID }}
          FLATPAK_GPG_PASSPHRASE: ${{ secrets.FLATPAK_GPG_PASSPHRASE }}
        run: |
          export GNUPGHOME="$RUNNER_TEMP/gnupg"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          printf 'allow-preset-passphrase\n' > "$GNUPGHOME/gpg-agent.conf"
          printf 'pinentry-mode loopback\n' > "$GNUPGHOME/gpg.conf"

          printf '%s' "$FLATPAK_GPG_PRIVATE_KEY" | gpg --batch --import

          if [ -n "$FLATPAK_GPG_PASSPHRASE" ]; then
            KEYGRIP=$(gpg --batch --with-keygrip --list-secret-keys "$FLATPAK_GPG_KEY_ID" | awk '/Keygrip/ { print $3; exit }')
            gpg-connect-agent reloadagent /bye
            /usr/lib/gnupg/gpg-preset-passphrase --preset --passphrase "$FLATPAK_GPG_PASSPHRASE" "$KEYGRIP"
          fi

          gpg --batch --export "$FLATPAK_GPG_KEY_ID" > "$RUNNER_TEMP/mimick-repo-public.gpg"

          echo "gpg_homedir=$GNUPGHOME" >> "$GITHUB_OUTPUT"
          echo "gpg_key_id=$FLATPAK_GPG_KEY_ID" >> "$GITHUB_OUTPUT"
          echo "public_key_file=$RUNNER_TEMP/mimick-repo-public.gpg" >> "$GITHUB_OUTPUT"
          echo "public_key_b64=$(base64 --wrap=0 "$RUNNER_TEMP/mimick-repo-public.gpg")" >> "$GITHUB_OUTPUT"

      - name: Build Flatpak Repository
        env:
          GNUPGHOME: ${{ steps.signing_key.outputs.gpg_homedir }}
        run: |
          flatpak-builder \
            --user \
            --repo=repo \
            --ccache \
            --force-clean \
            --install-deps-from=flathub \
            --gpg-sign="${{ steps.signing_key.outputs.gpg_key_id }}" \
            --gpg-homedir="${{ steps.signing_key.outputs.gpg_homedir }}" \
            build-dir io.github.nicx17.mimick.local.yml
            
          flatpak build-update-repo repo \
            --generate-static-deltas \
            --gpg-sign="${{ steps.signing_key.outputs.gpg_key_id }}" \
            --gpg-homedir="${{ steps.signing_key.outputs.gpg_homedir }}" \
            --gpg-import="${{ steps.signing_key.outputs.public_key_file }}"
    
      - name: Generate .flatpakrepo file
        env:
          REPO_GPG_KEY: ${{ steps.signing_key.outputs.public_key_b64 }}
        run: |
          cat << EOF > repo/mimick.flatpakrepo
          [Flatpak Repo]
          Title=Mimick Repository
          Url=https://nicx17.github.io/mimick/
          Homepage=https://github.com/nicx17/mimick
          Comment=Official repository for the Mimick Immich sync daemon
          Description=A daemon-based synchronization tool for uploading media files from a Linux desktop to an Immich server.
          Icon=https://nicx17.github.io/mimick/icon.png
          GPGKey=$REPO_GPG_KEY
          EOF
          
      - name: Copy landing page assets
        run: |
          cp site/index.html repo/index.html
          cp site/styles.css repo/styles.css
          cp site/icon.png repo/icon.png

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'repo'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4