name: Build and Deploy Flatpak Repo

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: "--no-deprecation"

jobs:
  build-repo:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize fresh OSTree repository
        run: ostree init --repo=repo --mode=archive-z2

      - name: Validate desktop entry
        run: desktop-file-validate setup/dev.nicx.mimick.desktop

      - name: Validate AppStream metadata
        run: appstreamcli validate --no-net setup/metainfo/dev.nicx.mimick.metainfo.xml

      - name: Import Flatpak signing key
        id: signing_key
        env:
          FLATPAK_GPG_PRIVATE_KEY: ${{ secrets.FLATPAK_GPG_PRIVATE_KEY }}
          FLATPAK_GPG_KEY_ID: ${{ secrets.FLATPAK_GPG_KEY_ID }}
          FLATPAK_GPG_PASSPHRASE: ${{ secrets.FLATPAK_GPG_PASSPHRASE }}
        run: |
          if [ -z "$FLATPAK_GPG_PRIVATE_KEY" ] || [ -z "$FLATPAK_GPG_KEY_ID" ]; then
            echo "Missing FLATPAK_GPG_PRIVATE_KEY or FLATPAK_GPG_KEY_ID secret"
            exit 1
          fi

          export GNUPGHOME="$RUNNER_TEMP/gnupg"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          printf 'allow-preset-passphrase\n' > "$GNUPGHOME/gpg-agent.conf"
          printf 'pinentry-mode loopback\n' > "$GNUPGHOME/gpg.conf"

          printf '%s' "$FLATPAK_GPG_PRIVATE_KEY" | gpg --batch --import

          if [ -n "$FLATPAK_GPG_PASSPHRASE" ]; then
            GPG_PRESET_PASSPHRASE="$(command -v gpg-preset-passphrase || true)"
            if [ -z "$GPG_PRESET_PASSPHRASE" ] && [ -x /usr/lib/gnupg/gpg-preset-passphrase ]; then
              GPG_PRESET_PASSPHRASE=/usr/lib/gnupg/gpg-preset-passphrase
            fi
            if [ -z "$GPG_PRESET_PASSPHRASE" ] && [ -x /usr/libexec/gpg-preset-passphrase ]; then
              GPG_PRESET_PASSPHRASE=/usr/libexec/gpg-preset-passphrase
            fi
            if [ -z "$GPG_PRESET_PASSPHRASE" ]; then
              echo "Unable to find gpg-preset-passphrase in the Flatpak build container"
              exit 1
            fi

            KEYGRIP=$(gpg --batch --with-keygrip --list-secret-keys "$FLATPAK_GPG_KEY_ID" | awk '/Keygrip/ { print $3; exit }')
            gpg-connect-agent reloadagent /bye
            "$GPG_PRESET_PASSPHRASE" --preset --passphrase "$FLATPAK_GPG_PASSPHRASE" "$KEYGRIP"
          fi

          gpg --batch --export "$FLATPAK_GPG_KEY_ID" > "$RUNNER_TEMP/mimick-repo-public.gpg"

          {
            echo "gpg_homedir=$GNUPGHOME"
            echo "gpg_key_id=$FLATPAK_GPG_KEY_ID"
            echo "public_key_file=$RUNNER_TEMP/mimick-repo-public.gpg"
            echo "public_key_b64=$(base64 --wrap=0 "$RUNNER_TEMP/mimick-repo-public.gpg")"
          } >> "$GITHUB_OUTPUT"

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@401fe28a8384095fc1531b9d320b292f0ee45adb # v6
        env:
          GNUPGHOME: ${{ steps.signing_key.outputs.gpg_homedir }}
        with:
          manifest-path: dev.nicx.mimick.local.yml
          build-bundle: false
          upload-artifact: false
          cache-key: flatpak-builder-gnome50-${{ hashFiles('dev.nicx.mimick.local.yml', 'Cargo.lock', 'cargo-sources.json') }}
          gpg-sign: ${{ steps.signing_key.outputs.gpg_key_id }}
          verbose: true

      - name: Finalize repository metadata
        env:
          GNUPGHOME: ${{ steps.signing_key.outputs.gpg_homedir }}
        run: |
          flatpak build-update-repo repo \
            --gpg-sign="${{ steps.signing_key.outputs.gpg_key_id }}" \
            --gpg-homedir="${{ steps.signing_key.outputs.gpg_homedir }}" \
            --gpg-import="${{ steps.signing_key.outputs.public_key_file }}"

      - name: Generate .flatpakrepo file
        env:
          REPO_GPG_KEY: ${{ steps.signing_key.outputs.public_key_b64 }}
        run: |
          {
            printf '[Flatpak Repo]\n'
            printf 'Title=Mimick Repository\n'
            printf 'DefaultBranch=stable\n'
            printf 'RuntimeRepo=https://dl.flathub.org/repo/flathub.flatpakrepo\n'
            printf 'Url=https://mimick.nicx.dev/\n'
            printf 'Homepage=https://github.com/nicx17/mimick\n'
            printf 'Comment=Official repository for the Mimick Immich sync daemon\n'
            printf 'Description=A daemon-based synchronization tool for uploading media files from a Linux desktop to an Immich server.\n'
            printf 'Icon=https://mimick.nicx.dev/icon.png\n'
            printf 'GPGKey=%s\n' "$REPO_GPG_KEY"
          } > repo/mimick.flatpakrepo

      - name: Generate .flatpakref file
        env:
          REPO_GPG_KEY: ${{ steps.signing_key.outputs.public_key_b64 }}
        run: |
          {
            printf '[Flatpak Ref]\n'
            printf 'Title=Mimick\n'
            printf 'Name=dev.nicx.mimick\n'
            printf 'Branch=stable\n'
            printf 'Url=https://mimick.nicx.dev/\n'
            printf 'SuggestRemoteName=mimick\n'
            printf 'Homepage=https://github.com/nicx17/mimick\n'
            printf 'Icon=https://mimick.nicx.dev/icon.png\n'
            printf 'RuntimeRepo=https://dl.flathub.org/repo/flathub.flatpakrepo\n'
            printf 'IsRuntime=false\n'
            printf 'GPGKey=%s\n' "$REPO_GPG_KEY"
          } > repo/mimick.flatpakref

      - name: Copy landing page assets
        run: |
          cp site/index.html repo/index.html
          cp site/styles.css repo/styles.css
          cp site/icon.png repo/icon.png
          cp site/robots.txt repo/robots.txt
          cp site/sitemap.xml repo/sitemap.xml
          cp -r docs/screenshots repo/screenshots

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: repo

  deploy-pages:
    needs: build-repo
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Setup GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
