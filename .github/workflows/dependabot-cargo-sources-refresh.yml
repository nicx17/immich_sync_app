name: Dependabot Cargo Sources Refresh

on:
  pull_request_target:
    types: [opened, reopened, synchronize]
    branches: ["main"]

permissions:
  contents: write
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: "--no-deprecation"

jobs:
  refresh-vendoring:
    name: Refresh cargo-sources.json for Dependabot
    if: >
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.actor == 'dependabot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Dependabot branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Decide whether refresh is needed
        id: precheck
        shell: bash
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- Cargo.toml Cargo.lock cargo-sources.json)"

          if [[ -z "$CHANGED_FILES" ]]; then
            echo "No Cargo or vendored-source changes detected."
            echo "needs_refresh=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if grep -qx 'cargo-sources.json' <<< "$CHANGED_FILES"; then
            echo "cargo-sources.json already changed in this PR."
            echo "needs_refresh=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! grep -qx 'Cargo.lock' <<< "$CHANGED_FILES"; then
            echo "Cargo.lock did not change. No refresh needed."
            echo "needs_refresh=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LOCK_NUMSTAT="$(git diff --numstat "$BASE_SHA" "$HEAD_SHA" -- Cargo.lock)"
          ADDED_LINES="$(awk '{print $1}' <<< "$LOCK_NUMSTAT")"
          DELETED_LINES="$(awk '{print $2}' <<< "$LOCK_NUMSTAT")"

          if [[ "$ADDED_LINES" == "1" && "$DELETED_LINES" == "1" ]] && \
             git diff -U1 "$BASE_SHA" "$HEAD_SHA" -- Cargo.lock | grep -q 'name = "mimick"'; then
            echo "Detected root package version-only Cargo.lock change. No refresh needed."
            echo "needs_refresh=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Cargo.lock changed without cargo-sources.json. Refresh required."
          echo "needs_refresh=true" >> "$GITHUB_OUTPUT"

      - name: Install generator dependencies
        if: steps.precheck.outputs.needs_refresh == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install "aiohttp<4.0.0,>=3.9.5" "PyYAML<7.0.0,>=6.0.2" "tomlkit>=0.13.3,<1.0"

      - name: Regenerate cargo-sources.json
        if: steps.precheck.outputs.needs_refresh == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python3 flatpak-cargo-generator.py Cargo.lock -o cargo-sources.json

      - name: Commit refreshed vendor sources
        if: steps.precheck.outputs.needs_refresh == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- cargo-sources.json; then
            echo "Generator produced no changes to cargo-sources.json."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cargo-sources.json
          git commit -m "ci: refresh cargo-sources.json for Dependabot"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"